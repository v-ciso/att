<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sales Engine mark: obsidian tile with a gold gauge ring, echoing the
       sidebar logo. Replaces the old FieldOS "F". A customer who uploads their
       own logo in Settings overrides this at runtime. -->
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7E08A"/>
      <stop offset="55%" stop-color="#E7C24A"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#000"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="6" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <path d="M16 7.5 L16 16 L22 22" fill="none" stroke="#000" stroke-width="3.6" stroke-linecap="round"/>
  <path d="M16 9 L16 16 L21 21" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
</svg>
